name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write       # OIDC for cosign keyless + attest-build-provenance
  attestations: write   # actions/attest-build-provenance persistence

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          check-latest: true
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: sigstore/cosign-installer@v4.1.2

      - uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest archives
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-checksums: ./dist/checksums.txt

      - name: Attest container images
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-checksums: ./dist/digests.txt
