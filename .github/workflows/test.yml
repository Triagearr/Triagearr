name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: bun install
        working-directory: web
        run: bun install --frozen-lockfile

      - name: type check
        working-directory: web
        run: bun run lint

      - name: vitest
        working-directory: web
        run: bun run test

      - name: vite build
        working-directory: web
        run: bun run build

      - name: upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          check-latest: true
          cache: true

      - name: download UI bundle
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -n 1
