# =============================================================================
# Triagearr — heavily-commented example configuration
# =============================================================================
# Copy this file to /config/config.yml and adjust to your environment.
# Anything in ${VAR} syntax is replaced with the value of the environment
# variable at load time (and on SIGHUP reload).
# See docs/CONFIGURATION.md for the authoritative reference.
# =============================================================================

# Master mode switch.
#   dry-run: logs what *would* happen but never deletes. Safe.
#   live:    destructive actions enabled. Requires also act:true per *arr.
mode: dry-run

# -----------------------------------------------------------------------------
# HTTP server
# -----------------------------------------------------------------------------
http:
  # bind: "" disables the HTTP API entirely. Default is 127.0.0.1:9494.
  bind: "127.0.0.1:9494"
  # The API key is NOT configured here. It lives in `${data_dir}/api_key` and
  # is auto-generated (Sonarr-style) on first boot with 0600 perms. Read it
  # from that file after the first start.
  # CORS — leave empty unless serving the UI from a different origin (dev only).
  cors_origins: []

# -----------------------------------------------------------------------------
# Storage
# -----------------------------------------------------------------------------
storage:
  # Keep the DB on Triagearr's own /config volume — the TRaSH shared mount
  # owns /data (ADR-0023).
  sqlite_path: /config/triagearr.db
  retention:
    snapshots_raw: 168h      # 7d — high-resolution snapshots kept this long
    snapshots_daily: 8760h   # 365d — downsampled daily aggregates kept this long
  vacuum:
    enabled: true
    min_reclaim_mb: 50       # skip VACUUM if reclaimable space < this

# -----------------------------------------------------------------------------
# *arr instances
# -----------------------------------------------------------------------------
# One instance per type — the type key (sonarr, radarr, …) is the identity.
# Defaults are conservative: nothing is enabled until you say so.
#
# SEED-ONLY (ADR-0022): this block seeds the arr_connections database table on
# first boot only. After that the table is the source of truth and is managed
# from the dashboard (Settings → *arr connections); edits here have no effect.
arrs:
  sonarr:
    enabled: true
    url: http://sonarr:8989
    api_key: ${SONARR_API_KEY}
    poll: true             # read state from this instance
    act: false             # ❗ leave false until you've validated dry-run output
    tags_exclude: [triagearr-keep]
    categories_only: []

  radarr:
    enabled: true
    url: http://radarr:7878
    api_key: ${RADARR_API_KEY}
    poll: true
    act: false
    tags_exclude: [triagearr-keep]

  lidarr:
    enabled: false
  whisparr_v2:
    enabled: false
  whisparr_v3:
    enabled: false

# -----------------------------------------------------------------------------
# Torrent clients — one instance per kind (ADR-0025)
# -----------------------------------------------------------------------------
# Only the qbittorrent kind has a backend today; transmission/deluge/rtorrent
# are scaffolded in the UI as "coming soon" and rejected by the daemon if
# enabled in YAML. The block below is only read on first boot to seed the
# torrent_client_connections table — thereafter the DB is the source of truth.
torrent_clients:
  qbittorrent:
    enabled: true
    url: http://gluetun:8090     # qbit often shares gluetun's netns
    username: ""
    password: ""
    category_exclude: [keep, archive]
    tags_exclude: [forever, triagearr-keep]
    delete_with_files: true      # delete physical files when nlink==1

# -----------------------------------------------------------------------------
# Maintainerr (V2, optional)
# -----------------------------------------------------------------------------
# Read-only mirroring of Maintainerr collections so Triagearr can be aware of
# what Maintainerr plans to delete. Does not affect V1 behavior.
maintainerr:
  enabled: false
  url: http://maintainerr:6246
  api_key: ""

# -----------------------------------------------------------------------------
# Volume to watch for disk pressure
# -----------------------------------------------------------------------------
# Triagearr watches exactly one volume (ADR-0024): the TRaSH shared data root.
# Multi-disk setups unify their disks below the OS (mergerfs/unionfs/pool) and
# point Triagearr at that single mount.
volume:
  name: media                    # display label only
  path: /data                    # the shared data root — SAME container path
                                 # as qBit/*arr (ADR-0023); statfs'd for disk
                                 # usage and the prefix of every qBit save_path
  disk_pressure:
    enabled: true
    threshold_free_percent: 15   # fire if free < 15%
    target_free_percent: 25      # aim to restore to 25% free
                                 # per-run cap is action.max_deletions_per_run (a count)

# -----------------------------------------------------------------------------
# Polling cadences
# -----------------------------------------------------------------------------
polling:
  torrent_client_interval: 30m
  arr_interval: 1h
  arr_file_min_interval: 200ms     # spacing between per-file *arr calls (~5 req/s)
  tracker_interval: 6h             # qBit tracker statuses (ADR-0009)
  disk_interval: 5m
  maintainerr_interval: 1h
  downsample_cron: "0 3 * * *"     # daily 3 AM UTC

# Per ADR-0012, mapping of qBit hashes to *arr files is derived from *arr's
# import history (the arr poller fetches /api/v3/history?eventType=3 deltas
# alongside media + per-file polls). Triagearr and the *arr/qBit stack must
# share one mount at one path (ADR-0023).

# -----------------------------------------------------------------------------
# Scoring (see docs/SCORING.md for the algorithm)
# -----------------------------------------------------------------------------
scoring:
  weights:
    ratio_obligation_met:  +50
    upload_velocity_inv:   +30
    age_days:              +0.1
    seeders_low_guard:     -1000   # near-veto for rare content
    swarm_health_bonus:    +5
    # hnr_window is a hard non-configurable veto (-10000), see SCORING.md

  hnr_window_days: 14              # never act within this window of torrent added

  # Per-tracker policy + the rare-content default now live in the database
  # (ADR-0026) and are edited from the dashboard (Settings → Scoring). The
  # YAML `per_tracker` / `rare_content_threshold` blocks are removed; the
  # defaults are seeded on first boot with conservative values:
  #   min_ratio = 1.0, min_seed_days = 30, rare_threshold = 3.

# -----------------------------------------------------------------------------
# Triggers
# -----------------------------------------------------------------------------
triggers:
  schedule: "0 4 * * *"      # cron expression; empty/null disables
  disk_pressure: true        # fire on threshold cross
  manual_api: true           # allow POST /api/v1/runs

# -----------------------------------------------------------------------------
# Action safety caps
# -----------------------------------------------------------------------------
action:
  max_deletions_per_run: 10
  inter_action_delay: 2s
  # When true, *arr is asked to add deleted releases to the import-exclusion
  # list so they aren't re-grabbed. Per-operator choice — leave false to keep
  # behaviour observable while the workflow stabilises.
  add_import_exclusion: false
  # Cross-seed safety net (per-file nlink check) is deferred to a later
  # milestone — see docs/HARDLINK_TOPOLOGY.md. ADR-0023's shared-mount
  # contract makes the stat() it needs viable.

# -----------------------------------------------------------------------------
# Notifications
# -----------------------------------------------------------------------------
# A notification is sent only when a disk-pressure run actually reaches the
# Actor and deletes (or attempts to delete) at least one item — manual HTTP/CLI
# runs stay silent on purpose (ADR-0021). bot_token + chat_id are also editable
# from the dashboard (Settings → Notifications).
notifications:
  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
