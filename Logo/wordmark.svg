<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none" role="img" aria-label="Triagearr">
  <title>Triagearr</title>

  <!-- ============================================================
       WORDMARK
       Canvas 720x200. Mark à gauche (viewBox source 256x256,
       scalé à 200x200), wordmark à droite avec ~24px de gap.
       ============================================================ -->

  <!-- ===== MARK (copie de logo.svg, translate+scale) ===== -->
  <g transform="translate(0,0) scale(0.78125)">
    <!-- FUNNEL — 3 tiers, sans bordures -->
    <polygon points="36,40 220,40 198,82 58,82"   fill="#B85551"/>
    <polygon points="64,94 192,94 170,138 86,138" fill="#C0913C"/>
    <polygon points="94,150 162,150 128,214"      fill="#4A9962"/>

    <!-- Cadran crème + bezel fine -->
    <circle cx="128" cy="100" r="20" fill="#EFE6D0"
            stroke="#2A2D42" stroke-width="1.25"/>

    <!-- Track non éclairé -->
    <path d="M 113,100 A 15,15 0 0 1 143,100"
          stroke="#9C8E6E" stroke-width="3" fill="none" stroke-linecap="butt" opacity="0.35"/>

    <!-- Arcs éclairés vert → ambre → rouge -->
    <path d="M 113,100 A 15,15 0 0 1 120.5,87.01"
          stroke="#4A9962" stroke-width="3" fill="none" stroke-linecap="butt"/>
    <path d="M 120.5,87.01 A 15,15 0 0 1 135.5,87.01"
          stroke="#C0913C" stroke-width="3" fill="none" stroke-linecap="butt"/>
    <path d="M 135.5,87.01 A 15,15 0 0 1 138.61,89.39"
          stroke="#B85551" stroke-width="3" fill="none" stroke-linecap="butt"/>

    <!-- Tick marks -->
    <line x1="111.5" y1="100" x2="110" y2="100"
          stroke="#2A2D42" stroke-width="1" stroke-linecap="butt" opacity="0.6"/>
    <line x1="128" y1="83.5" x2="128" y2="82"
          stroke="#2A2D42" stroke-width="1" stroke-linecap="butt" opacity="0.6"/>
    <line x1="144.5" y1="100" x2="146" y2="100"
          stroke="#2A2D42" stroke-width="1" stroke-linecap="butt" opacity="0.6"/>

    <!-- Aiguille + pivot -->
    <line x1="128" y1="100" x2="138.61" y2="89.39"
          stroke="#2A2D42" stroke-width="2" stroke-linecap="round"/>
    <circle cx="128" cy="100" r="2" fill="#2A2D42"/>
  </g>

  <!-- ===== WORDMARK =====
       Bas-de-casse, sans-serif geometric. font-family stack avec
       Inter / system-ui en fallback. Pour finaliser, convertir en
       paths (fontforge / Figma "outline strokes") pour ne plus
       dépendre du système de rendu.
  -->
  <text x="220" y="125"
        font-family="Inter, -apple-system, system-ui, 'Segoe UI', sans-serif"
        font-size="84"
        font-weight="600"
        letter-spacing="-2"
        fill="#2A2D42">triagearr</text>

  <!-- Tagline optionnelle (commentée — décommenter si voulu)
  <text x="222" y="160"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="18"
        letter-spacing="2"
        fill="#9C8E6E">DISK-PRESSURE REAPER</text>
  -->
</svg>
