version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - revive
    - misspell
    - bodyclose
    - noctx
    - unconvert
    - unparam
    - prealloc
    - copyloopvar
    - nilerr
    - errorlint
  settings:
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: package-comments
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: errorf
        - name: context-as-argument
        - name: context-keys-type
        - name: indent-error-flow
    gosec:
      excludes:
        - G104
    errorlint:
      errorf: true
      asserts: true
      comparison: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Triagearr/Triagearr
