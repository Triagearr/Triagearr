# Default dev scenario — realistic baseline for UI iteration.
#
# Contains a deliberate mix of edge cases that should be visible in the UI:
#   * One private torrent with a healthy tracker (Factor 4 working path)
#   * Two private torrents with a dead tracker (graveyard signal, primary target)
#   * One public torrent (no ratio obligation)
#   * One season pack with multiple episode files (multi-file granularity)
#   * One HnR-window torrent (low ratio, recent — must score -10000)
#
# Hashes are deterministic 40-hex info-hash-shaped strings (not real torrents).
# Timestamps are unix seconds; pick values relative to 2026-05-21.

name: default

# Initial values for the fake disk source (cmd/devfixtures exposes
# /disk/{name} on port 18091). Picked above the dev threshold so the UI shows
# a healthy gauge by default — `curl -X POST .../disk/dev/fill` to simulate
# pressure and exercise the trigger path.
disks:
  - name: dev
    total_bytes: 1000000000000      # 1 TB
    free_bytes: 250000000000        # 250 GB → 25% free, healthy

