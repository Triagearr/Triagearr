    # ── Ratio paid in full: private, alive tracker, ratio 2.4 (≥ 1.0) and seed
    # time well past 30d, HnR window long cleared, healthy swarm. Obligation met
    # → ratio_obligation_met (+50) credited; no veto applies. Scores just below
