      num_incomplete: 2
      state: "uploading"
      last_activity: 1748600000
      private: true
      tags: ""
      files:
        - { name: "Severance.S02E01.mkv", size: 20000000000, progress: 1.0 }
        - { name: "Severance.S02E02.mkv", size: 20000000000, progress: 1.0 }
