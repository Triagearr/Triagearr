    # ── Healthy active seed on a live tracker. Kept for context in the list.
    - hash: "d000000000000000000000000000000000000005"
      name: "Public.Linux.Distro.2026.iso"
      category: ""
      save_path: "/tmp/triagearr-dev/torrents/orphans"
      size: 5000000000
      added_on: 1747000000
      completion_on: 1747100000
      ratio: 3.2
      uploaded: 16000000000
      num_complete: 240
      num_incomplete: 30
      state: "uploading"
      last_activity: 1748600000
      private: false
      files:
        - { name: "linux-distro-2026.iso", size: 5000000000, progress: 1.0 }
      trackers:
        - { url: "udp://tracker.opentrackr.example.org:1337/announce", status: 2 }

    # ── User override: PRIORITIZE DELETION. A healthy, actively-seeding manual
    # grab (qBit-only, no *arr) that would normally rank near the bottom — the
    # swarm doesn't need it gone. The operator flips "Prioritize deletion" in the
    # UI (candidate_boost, +2000, set at runtime by record.mjs), so it jumps to
    # the very top of the queue and is REAPED FIRST. Shows the operator can force
    # anything out, regardless of score.
    - hash: "d000000000000000000000000000000000000007"
      name: "Bloated.4K.Test.Footage.2160p-FAKE"
      category: ""
      save_path: "/tmp/triagearr-dev/torrents/orphans"
      size: 30000000000            # 30 GB
      added_on: 1745000000         # recent — low age, would rank low on its own
      completion_on: 1745100000
      ratio: 0.5
      uploaded: 15000000000
      num_complete: 60             # healthy swarm — not rare, not vetoed
      num_incomplete: 8
      state: "uploading"
      last_activity: 1748700000
      private: false
      tags: ""
      files:
        - { name: "Bloated.4K.Test.Footage.mkv", size: 30000000000, progress: 1.0 }
      trackers:
        - { url: "udp://tracker.opentrackr.example.org:1337/announce", status: 2 }

    # ── User override: PROTECT. A dead-tracker archive that scores like a top
    # graveyard candidate (~140) — but it's irreplaceable, so the operator flips
    # "Protect" in the UI (torrents.protected, set at runtime by record.mjs). The
    # Decider drops it from the candidate set entirely: high score, never touched.
    - hash: "d000000000000000000000000000000000000008"
      name: "Personal.Archive.S01.COMPLETE-FAKE"
      category: ""
      save_path: "/tmp/triagearr-dev/torrents/orphans"
      size: 50000000000            # 50 GB
