# Demo scenario — the README/landing visual (scripts/record-demo.sh).
#
# Tells one story end to end:
#   1. Disk sits healthy (~28% free, above the 15% threshold).
#   2. A fresh grab lands (injected at runtime via the qBit control endpoint)
#      and tips the volume below threshold — pressure fires.
#   3. The scored library shows the full spread of regimes and overrides:
#      dead-tracker graveyards, a ratio-paid private seed, an operator-boosted
#      grab, an operator-protected archive, rare content, a saturated public
#      seed. (protected + candidate_boost are DB-only; record.mjs sets them via
#      the API at runtime — the scenario can't seed them.)
#   4. A human arms + confirms a live run. It reaps, in score order: the
#      operator-BOOSTED grab first (+2000 jumps it to the top), then the three
#      graveyards, then the ratio-paid private seed (Severance) — enough to clear
#      the pressure.
#   5. SPARED: the freshly-grabbed release (HnR window veto, -10000), the rare
#      low-seeder release (seeders guard), the operator-PROTECTED archive (high
#      score but excluded by hand), and the saturated public seed (a candidate,
#      but never reached — target met first). Guard rails and operator intent
#      both hold; nothing the swarm still needs is touched.
#
# Hashes are deterministic 40-hex info-hash-shaped strings (not real torrents).
# Timestamps are unix seconds relative to ~2026-06-01 (1748736000).

name: demo

# 1 TB volume, 28% free → above the 15% threshold and the 25% target, so the
# gauge opens green/calm. The injected grab + disk fill drops it to ~10%.
disks:
  - name: dev
    total_bytes: 1000000000000      # 1 TB
    free_bytes: 280000000000        # 280 GB → 28% free, healthy

