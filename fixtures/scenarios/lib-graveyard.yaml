# Lib graveyard — primary Triagearr target (mémoire: lib_graveyard_mode).
#
# 100% of torrents have a dead tracker. Stress-tests the scoring path that
# Factor 4 (tracker_alive) drives, and the UI's display of graveyard signals.
# Most items also have ratio < 1.0 — no obligation already met.

name: lib-graveyard

# Below threshold by default — the graveyard scenario is meant to exercise
# the disk-pressure trigger firing on a real-feeling load. 8% free vs 15%
# threshold → pressure trigger fires on the first tick.
disks:
  - name: dev
    total_bytes: 1000000000000      # 1 TB
    free_bytes: 80000000000         # 80 GB → 8% free, BELOW threshold

