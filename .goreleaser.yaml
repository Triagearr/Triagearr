version: 2

project_name: triagearr

before:
  hooks:
    - go mod tidy
    # M6: build the React UI before compiling the binary so `embed.FS` picks
    # up the production bundle. The hooks run from the repo root; `bun` is
    # provided by aqua / the CI setup-bun step.
    - sh -c "cd web && bun install --frozen-lockfile && bun run build"

builds:
  - id: triagearr
    main: ./cmd/triagearr
    binary: triagearr
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .CommitDate }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - config.example.yml

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# CycloneDX SBOM per archive (consumed by Trivy/Grype). Source SBOM omitted —
# the archive SBOM already lists the Go module tree.
sboms:
  - artifacts: archive
    cmd: syft
    args: ["$artifact", "--output", "cyclonedx-json=$document"]
    documents: ["${artifact}.cyclonedx.json"]

# Sign the checksum file only — every archive + SBOM is listed inside, so the
# signature covers them transitively (sha256sum -c then cosign verify-blob).
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# artifacts defaults to "none" — without it goreleaser signs nothing. "all"
# covers both the per-arch images and the multi-arch manifest users pull by tag,
# so `cosign verify ghcr.io/.../triagearr:<tag>` resolves a signature.
docker_signs:
  - cmd: cosign
    artifacts: all
    args: ["sign", "${artifact}", "--yes"]
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github-native
  sort: asc

dockers:
  - id: linux-amd64
    image_templates:
      - "ghcr.io/triagearr/triagearr:{{ .Version }}-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=COMMIT={{ .ShortCommit }}"
      - "--build-arg=DATE={{ .CommitDate }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
  - id: linux-arm64
    image_templates:
      - "ghcr.io/triagearr/triagearr:{{ .Version }}-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=COMMIT={{ .ShortCommit }}"
      - "--build-arg=DATE={{ .CommitDate }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"

docker_manifests:
  - name_template: "ghcr.io/triagearr/triagearr:{{ .Version }}"
    image_templates:
      - "ghcr.io/triagearr/triagearr:{{ .Version }}-amd64"
      - "ghcr.io/triagearr/triagearr:{{ .Version }}-arm64"
  - name_template: "ghcr.io/triagearr/triagearr:{{ if .Prerelease }}rc{{ else }}latest{{ end }}"
    image_templates:
      - "ghcr.io/triagearr/triagearr:{{ .Version }}-amd64"
      - "ghcr.io/triagearr/triagearr:{{ .Version }}-arm64"

release:
  github:
    owner: Triagearr
    name: Triagearr
  prerelease: auto
  mode: replace
  header: |
    ## triagearr {{ .Tag }}

    Container image: `ghcr.io/triagearr/triagearr:{{ .Version }}`
